name: Send General Pending Report

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Gerar preview sem enviar e-mail"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      snapshot_only:
        description: "Salvar snapshot sem enviar e-mail"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # 17:30 America/Sao_Paulo: snapshot diario, exceto sexta
    - cron: "30 20 * * 0-4,6"
    # 17:30 America/Sao_Paulo: snapshot + envio semanal para diretoria
    - cron: "30 20 * * 5"

jobs:
  send-report:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_GENERAL_REPORT_EMAIL == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send report request
        env:
          REPORT_API_BASE: ${{ vars.REPORT_GENERAL_API_BASE || secrets.REPORT_GENERAL_API_BASE }}
          LEGACY_REPORT_ENDPOINT: ${{ secrets.REPORT_GENERAL_EMAIL_ENDPOINT }}
          REPORT_TOKEN: ${{ secrets.RELATORIO_EMAIL_SERVICE_TOKEN || secrets.PROD_RELATORIO_EMAIL_SERVICE_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SNAPSHOT_ONLY_INPUT: ${{ github.event.inputs.snapshot_only || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -z "$REPORT_API_BASE" ] && [ -z "$LEGACY_REPORT_ENDPOINT" ]; then
            echo "REPORT_GENERAL_API_BASE or REPORT_GENERAL_EMAIL_ENDPOINT secret is required."
            exit 1
          fi

          if [ -z "$REPORT_TOKEN" ]; then
            echo "RELATORIO_EMAIL_SERVICE_TOKEN secret is required."
            exit 1
          fi

          SNAPSHOT_ONLY="$SNAPSHOT_ONLY_INPUT"
          if [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" != "30 20 * * 5" ]; then
            SNAPSHOT_ONLY="true"
          fi

          if [ -n "$REPORT_API_BASE" ]; then
            EMAIL_ENDPOINT="${REPORT_API_BASE%/}/email"
            SNAPSHOT_ENDPOINT="${REPORT_API_BASE%/}/snapshots"
          else
            API_BASE="${LEGACY_REPORT_ENDPOINT%/enviar-email}"
            EMAIL_ENDPOINT="${API_BASE%/}/email"
            SNAPSHOT_ENDPOINT="${API_BASE%/}/snapshots"
          fi

          if [ "$SNAPSHOT_ONLY" = "true" ] && [ "$DRY_RUN" != "true" ]; then
            REPORT_ENDPOINT="$SNAPSHOT_ENDPOINT"
            BODY="{\"inicio\": null}"
          else
            REPORT_ENDPOINT="$EMAIL_ENDPOINT"
            BODY="{\"dryRun\": $DRY_RUN, \"saveSnapshot\": true}"
          fi

          curl --fail --show-error --silent \
            --request POST "$REPORT_ENDPOINT" \
            --header "Authorization: Bearer $REPORT_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$BODY"
